<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>URL Shortener</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: linear-gradient(135deg, #eef2f7, #f8fafc);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  width: 420px;
  animation: fadeUp 0.8s ease;
}

.card {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.08);
  transition: 0.4s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 35px 70px rgba(0,0,0,0.12);
}

h1 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 25px;
  color: #111;
  letter-spacing: -0.5px;
}

.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
  transition: 0.3s;
  background: white;
}

input:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
  outline: none;
}

button {
  padding: 14px 18px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.25s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(99,102,241,0.3);
}

button:active {
  transform: scale(0.95);
}

.result {
  margin-top: 25px;
  font-size: 14px;
  animation: fadeIn 0.6s ease;
}

.short-link {
  color: #84c2c6;
  text-decoration: none;
  font-weight: 500;
  transition: 0.2s;
}

.short-link:hover {
  opacity: 0.7;
}

.copy-btn {
  margin-top: 12px;
  background: #f3f4f6;
  color: #111;
}

.copy-btn:hover {
  background: #e5e7eb;
}

.stats-card {
  margin-top: 20px;
  padding: 18px;
  background: rgba(249,250,251,0.9);
  border-radius: 14px;
  font-size: 13px;
  color: #444;
  transition: 0.3s;
}

.stats-card:hover {
  transform: translateY(-3px);
}

.qr {
  margin-top: 20px;
  text-align: center;
  animation: fadeIn 1s ease;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #888;
  text-align: center;
}

/* Animations */

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
/* Animated Background */
body {
  background: linear-gradient(-45deg, #eef2f7, #f8fafc, #e0e7ff, #f1f5f9);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  position: relative;
  overflow: hidden;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating Shapes */
.bg-shape {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.4;
  animation: float 10s infinite ease-in-out;
}

.shape1 {
  width: 300px;
  height: 300px;
  background: #6366f1;
  top: -100px;
  left: -100px;
}

.shape2 {
  width: 250px;
  height: 250px;
  background: #8b5cf6;
  bottom: -100px;
  right: -100px;
  animation-delay: 3s;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(30px); }
}

/* Dark Mode */
.dark {
  background: linear-gradient(-45deg, #0f172a, #1e293b, #111827, #1f2937);
  color: white;
}

.dark .card {
  background: rgba(30,41,59,0.8);
  color: white;
}

.dark input {
  background: #1f2937;
  border: 1px solid #334155;
  color: white;
}

.dark .stats-card {
  background: rgba(51,65,85,0.6);
  color: #ddd;
}

/* Theme Toggle */
.theme-toggle {
  position: absolute;
  top: 25px;
  right: 25px;
  background: white;
  border: none;
  padding: 10px 14px;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.theme-toggle:hover {
  transform: scale(1.1);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #111;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

/* Success Checkmark */
.success-check {
  margin-top: 10px;
  font-size: 20px;
  color: #22c55e;
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform: scale(0); }
  80% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="container">
  <div class="card">
    <h1>URL Shortener</h1>

    <!-- URL Input -->
    <div class="input-group">
      <input type="text" id="urlInput" placeholder="Paste your link here..." />
    </div>

    <!-- Expiry Input -->
    <div style="margin-top:12px;">
      <input type="number" id="expiryInput" placeholder="Expiry in days (optional)" min="1" />
    </div>

    <!-- Custom Code Input -->
    <div style="margin-top:12px;">
      <input type="text" id="customCodeInput" placeholder="Custom short code (optional)" />
    </div>

    <!-- Button -->
    <div style="margin-top:15px;">
      <button onclick="shorten()" style="width:100%;">Shorten</button>
    </div>

    <div class="result" id="result"></div>

    <div class="footer">
      Built with Node.js & MongoDB
    </div>
  </div>
</div>



<script>
let currentCode = null;
let interval = null;

async function shorten() {
  const url = document.getElementById("urlInput").value;
  
  const expiryDays = document.getElementById("expiryInput").value;
  const customCode = document.getElementById("customCodeInput").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "Generating...";

  const res = await fetch("/shorten", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ originalUrl: url 
        , expiryDays: expiryDays ? Number(expiryDays) : null
        , customCode: customCode ? customCode : null
    })
  });

  const data = await res.json();

  if (res.status !== 200) {
    resultDiv.innerHTML = `<div style="color:red">${data.message}</div>`;
    return;
  }

  const code = data.shortUrl.split("/").pop();
  currentCode = code;

  resultDiv.innerHTML = `
    <div>
      <a href="${data.shortUrl}" target="_blank" class="short-link">
        ${data.shortUrl}
      </a>
      <br>
      <button class="copy-btn" onclick="copyLink('${data.shortUrl}')">
        Copy Link
      </button>

      <div class="stats-card">
        <div><strong>Clicks:</strong> <span id="clickCount">...</span></div>
        <div><strong>Created:</strong> <span id="createdAt">...</span></div>
        <div><strong>Expires:</strong> <span id="expiryDate">...</span></div>
      </div>

      <div class="qr">
        <img id="qrCode" width="130">
      </div>
    </div>
  `;

  generateQR(data.shortUrl);
  fetchStats();
  startAutoUpdate();
}

async function fetchStats() {
  const res = await fetch(`/stats/${currentCode}`);
  const data = await res.json();

  document.getElementById("clickCount").innerText = data.clicks;
  document.getElementById("createdAt").innerText =
    new Date(data.createdAt).toLocaleString();
    document.getElementById("expiryDate").innerText =
    data.expiryDate ? new Date(data.expiryDate).toLocaleString() : "Never";
    
}

function startAutoUpdate() {
  if (interval) clearInterval(interval);
  interval = setInterval(fetchStats, 3000);
}

function copyLink(link) {
  navigator.clipboard.writeText(link);
  showToast("Link copied successfully!");
}
function generateQR(link) {
  document.getElementById("qrCode").src =
    `https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=${encodeURIComponent(link)}`;
}

document.getElementById("urlInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") shorten();
});
function toggleTheme() {
  document.body.classList.toggle("dark");
}

function showToast(message) {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerText = message;
  document.body.appendChild(toast);

  setTimeout(() => toast.classList.add("show"), 10);

  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 400);
  }, 3000);
}
</script>

</body>
</html>
